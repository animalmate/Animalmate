function Otp({value="",onChange,length=6,invalid}){const refs=React.useRef([]);const chars=Array.from({length},(_,i)=>value[i]||"");const set=v=>onChange&&onChange(v.slice(0,length));return <div style={{display:"flex",gap:8}}>{chars.map((c,i)=><input key={i} ref={el=>refs.current[i]=el} inputMode="numeric" value={c} onChange={e=>{const v=e.target.value.replace(/\D/g,"");if(v.length>1){set((value.slice(0,i)+v).slice(0,length));const e2=Math.min(i+v.length,length-1);refs.current[e2]&&refs.current[e2].focus();return;}set(chars.map((x,j)=>j===i?v:x).join(""));if(v&&i<length-1)refs.current[i+1]&&refs.current[i+1].focus();}} onKeyDown={e=>{if(e.key==="Backspace"&&!chars[i]&&i>0)refs.current[i-1].focus();}} style={{width:"100%",maxWidth:52,height:56,textAlign:"center",borderRadius:"var(--radius-md)",border:`1.5px solid ${invalid?"var(--error-600)":c?"var(--color-primary)":"var(--border-default)"}`,background:"var(--surface-card)",font:"700 22px/1 var(--font-sans)",color:"var(--text-title)",padding:0}}/>)}</div>;}

function StatusBadge({status}){const M={draft:["작성중","--status-draft-bg","--status-draft-fg"],ready:["완성","--status-ready-bg","--status-ready-fg"],scheduled:["발행 대기","--status-scheduled-bg","--status-scheduled-fg"],published:["발행됨","--status-published-bg","--status-published-fg"],failed:["실패","--status-failed-bg","--status-failed-fg"]};const[l,bg,fg]=M[status];return <span style={{display:"inline-flex",alignItems:"center",gap:6,borderRadius:999,padding:"4px 12px",font:"var(--text-badge)",background:`var(${bg})`,color:`var(${fg})`,whiteSpace:"nowrap"}}><i style={{width:7,height:7,borderRadius:99,background:"currentColor"}}/>{l}</span>;}

function Toast({kind="info",children,onClose}){const M={success:["check","var(--success-600)"],error:["alert","var(--error-600)"],info:["info","var(--info-600)"]};const[ic,co]=M[kind];return <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",minHeight:48,background:"var(--ink-900)",color:"#fff",borderRadius:"var(--radius-md)",boxShadow:"var(--shadow-raised)",font:"var(--text-body)",animation:"am-toast-in .2s ease-out"}}><span style={{color:co,background:"#fff",borderRadius:99,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",flex:"none"}}><Icon name={ic} size={14} sw={2.4}/></span><span style={{flex:1}}>{children}</span>{onClose&&<button onClick={onClose} aria-label="닫기" style={{border:"none",background:"transparent",color:"rgba(255,255,255,.7)",cursor:"pointer",padding:4,display:"flex"}}><Icon name="x" size={16}/></button>}</div>;}

const MENUS={member:[],staff:[{key:"queue",label:"예약",icon:"megaphone"},{key:"templates",label:"템플릿",icon:"doc"},{key:"bulk",label:"일괄 생성",icon:"layers"}],board:[{key:"queue",label:"예약",icon:"megaphone"},{key:"templates",label:"템플릿",icon:"doc"},{key:"bulk",label:"일괄 생성",icon:"layers"},{key:"teams",label:"조직",icon:"users"},{key:"code",label:"가입코드",icon:"key"},{key:"boards",label:"게시판",icon:"board"}]};

  return <header style={{position:"relative",background:"var(--surface-card)",borderBottom:"1px solid var(--border-default)"}}><div style={{display:"flex",alignItems:"center",gap:10,height:60,padding:"0 16px",maxWidth:1120,margin:"0 auto"}}><button onClick={()=>go("home")} style={{display:"flex",alignItems:"center",gap:8,border:"none",background:"none",cursor:"pointer",padding:0}}><img src="../../assets/logo-emblem-circle.png" style={{width:32,height:32}}/><strong style={{font:"700 17px/1 var(--font-sans)",color:"var(--text-title)"}}>애니멀메이트</strong></button>{!mobile&&<nav style={{display:"flex",gap:2,marginLeft:16}}>{menus.map(m=>item(m))}</nav>}<span style={{flex:1}}/><RoleBadge role={role}/>{!mobile&&<button onClick={onLogout} style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",cursor:"pointer",color:"var(--text-muted)",font:"var(--text-caption)",padding:"8px 4px"}}><Icon name="logout" size={16}/>로그아웃</button>}{mobile&&menus.length>0&&<button onClick={()=>setOpen(!open)} aria-label="메뉴" style={{width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",border:"none",background:"none",cursor:"pointer",color:"var(--text-title)"}}><Icon name={open?"x":"menu"} size={22}/></button>}</div>{mobile&&open&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:"var(--surface-card)",borderBottom:"1px solid var(--border-default)",boxShadow:"var(--shadow-raised)",padding:12,display:"flex",flexDirection:"column",gap:2}}>{menus.map(m=>item(m,true))}<button onClick={onLogout} style={{display:"flex",alignItems:"center",gap:12,border:"none",background:"none",cursor:"pointer",color:"var(--text-muted)",font:"var(--text-btn)",padding:"0 14px",height:52,borderTop:"1px solid var(--ink-100)",marginTop:6}}><Icon name="logout" size={18}/>로그아웃</button></div>}</header>;

function Auth({mode,mobile,onDone,onSwitch}){const[step,setStep]=useState(1);const[email,setEmail]=useState("mate@univ.ac.kr");const[code,setCode]=useState("");const login=mode==="login";return <div style={{minHeight:"100%",background:"var(--surface-page)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:mobile?"32px 16px":"48px 24px"}}><img src="../../assets/logo-emblem-circle.png" style={{width:72,height:72,marginBottom:14}}/><h1 style={{margin:"0 0 4px",font:"var(--text-h1)",color:"var(--text-title)"}}>애니멀메이트</h1><p style={{margin:"0 0 24px",font:"var(--text-body)",color:"var(--text-muted)"}}>동물봉사 동아리 운영 도우미</p><div style={{width:"100%",maxWidth:400,background:"var(--surface-card)",border:"1px solid var(--border-default)",borderRadius:"var(--radius-xl)",boxShadow:"var(--shadow-card)",padding:mobile?20:28,display:"flex",flexDirection:"column",gap:16}}>{step===1?<F><h2 style={{margin:0,font:"var(--text-h2)",color:"var(--text-title)"}}>{login?"로그인":"가입하기"}</h2>{!login&&<Field label="이름" required><Input placeholder="실명을 입력해 주세요"/></Field>}<Field label="이메일" required hint={login?undefined:"인증 코드를 받을 주소예요"}><Input type="email" value={email} onChange={e=>setEmail(e.target.value)}/></Field>{!login&&<Field label="가입코드" required hint="운영진에게 받은 학기 코드를 입력해 주세요"><Input placeholder="예: ANIMAL-2026-2"/></Field>}<Button block onClick={()=>setStep(2)}>인증 코드 받기</Button><p style={{margin:0,font:"var(--text-caption)",color:"var(--text-muted)",textAlign:"center"}}>{login?<F>처음이신가요? <Button variant="text" size="sm" onClick={onSwitch}>가입하기</Button></F>:<F>이미 계정이 있나요? <Button variant="text" size="sm" onClick={onSwitch}>로그인</Button></F>}</p></F>:<F><h2 style={{margin:0,font:"var(--text-h2)",color:"var(--text-title)"}}>메일을 확인해 주세요</h2><p style={{margin:0,font:"var(--text-body)"}}><strong style={{color:"var(--text-title)"}}>{email}</strong>(으)로 6자리 코드를 보냈어요.</p><Banner kind="info" icon="mail">네이버 메일은 인증 메일이 <strong>스팸함</strong>으로 갈 수 있어요.</Banner><F /* ══════════ APP ══════════ */
const SCREENS=[["auth-login","로그인","auth"],["auth-signup","가입","auth"],["home","홈","console"],["queue","예약 큐","console"],["new","새 예약","console"],["edit","예약 수정","console"],["editP","발행됨(수정불가)","console"],["bulk","일괄 생성","console"],["templates","템플릿","console"],["teams","조직","console"],["code","가입코드","console"],["boards","게시판","console"]];

    <div style={{width:mobile?390:"100%",maxWidth:mobile?390:1180,height:mobile?800:820,margin:"0 auto",position:"relative",overflow:"hidden",borderRadius:mobile?28:16,border:mobile?"10px solid #2E2921":"1px solid var(--border-default)",background:"var(--surface-page)",boxShadow:"var(--shadow-modal)"}}>
      <div style={{position:"absolute",inset:0,overflow:"auto"}}>{body}</div>
      {toast&&<div style={{position:"absolute",left:0,right:0,bottom:20,display:"flex",justifyContent:"center",padding:"0 16px",zIndex:200}}><Toast kind={toast.k}>{toast.t}</Toast></div>}
      {dialog&&<ConfirmDialog title={DLG[dialog][0]} description={DLG[dialog][1]} confirmLabel={DLG[dialog][2]} danger={DLG[dialog][3]} onCancel={()=>setDialog(null)} onConfirm={()=>{fire({k:"success",t:DLG[dialog][4]});setDialog(null);}}/>}
    </div>
  );
  return <div style={{minHeight:"100vh",padding:"16px 16px 40px"}}>
    <div style={{maxWidth:1180,margin:"0 auto 16px",display:"flex",flexWrap:"wrap",gap:12,alignItems:"center"}}>

      <span style={{flex:1}}/>
      <div style={{display:"flex",gap:4,background:"var(--surface-card)",border:"1px solid var(--border-default)",borderRadius:999,padding:4}}>{[["board","회장단"],["staff","운영진"],["member","부원"]].map(([v,l])=><button key={v} onClick={()=>setRole(v)} style={{cursor:"pointer",border:"none",borderRadius:999,padding:"6px 14px",font:"var(--text-badge)",background:role===v?"var(--color-primary)":"transparent",color:role===v?"#fff":"var(--text-muted)"}}>{l}</button>)}</div>
      <div style={{display:"flex",gap:4,background:"var(--surface-card)",border:"1px solid var(--border-default)",borderRadius:999,padding:4}}>{[[false,"데스크톱"],[true,"모바일"]].map(([v,l])=><button key={String(v)} onClick={()=>setMobile(v)} style={{cursor:"pointer",border:"none",borderRadius:999,padding:"6px 14px",font:"var(--text-badge)",background:mobile===v?"var(--ink-900)":"transparent",color:mobile===v?"#fff":"var(--text-muted)"}}>{l}</button>)}</div>
    </div>

</script>
