<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
.row{display:flex;gap:8px;padding:16px}
.sw{flex:1;border-radius:10px;height:78px;display:flex;align-items:flex-end;padding:8px;font:var(--text-badge);font-family:var(--font-mono);border:1px solid var(--ink-100)}
.cap{padding:0 16px;font:var(--text-caption);color:var(--text-muted)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--cream-25)">cream-25</div>
  <div class="sw" style="background:var(--cream-50)">cream-50</div>
  <div class="sw" style="background:var(--cream-100)">cream-100</div>
  <div class="sw" style="background:var(--ink-200)">ink-200</div>
  <div class="sw" style="background:var(--ink-400);color:#fff">ink-400</div>
  <div class="sw" style="background:var(--ink-500);color:#fff">ink-500</div>
  <div class="sw" style="background:var(--ink-700);color:#fff">ink-700</div>
  <div class="sw" style="background:var(--ink-900);color:#fff">ink-900</div>
</div>
<div class="cap">배경 cream-50 · 카드 #FFF · 테두리 ink-200 · 본문 ink-700 · 제목 ink-900</div>
</body></html>
