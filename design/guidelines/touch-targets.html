<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
.wrap{display:flex;gap:20px;padding:20px;align-items:center}
.t{display:flex;align-items:center;justify-content:center;font:var(--text-caption);font-family:var(--font-mono);color:var(--text-muted);border:1.5px dashed var(--blue-300);border-radius:12px;background:var(--blue-50)}
.note{font:var(--text-caption);color:var(--text-muted);max-width:220px}
</style></head><body>
<div class="wrap">
  <div class="t" style="width:120px;height:48px">48 컨트롤</div>
  <div class="t" style="width:44px;height:44px">44</div>
  <div class="t" style="width:96px;height:36px">36 sm</div>
  <div class="note">모바일 입력·버튼 48px, 최소 터치 타깃 44px. 36px(sm)은 데스크톱 보조 액션·카드 내부 버튼만.</div>
</div>
</body></html>
