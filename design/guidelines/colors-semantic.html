<!-- @dsCard group="Colors" viewport="700x150" subtitle="성공/경고/오류/정보" name="상태 컬러" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
.row{display:flex;gap:12px;padding:16px}
.c{flex:1;border-radius:12px;padding:12px;font:var(--text-label)}
.c span{display:block;font:var(--text-caption);font-family:var(--font-mono);margin-top:4px;opacity:.8}
</style></head><body>
<div class="row">
  <div class="c" style="background:var(--success-100);color:var(--success-700)">성공<span>#2F8A57</span></div>
  <div class="c" style="background:var(--warning-100);color:var(--warning-700)">경고<span>#C97F0A</span></div>
  <div class="c" style="background:var(--error-100);color:var(--error-700)">오류<span>#D8434B</span></div>
  <div class="c" style="background:var(--info-100);color:var(--info-700)">정보<span>#3E6FB9</span></div>
</div>
</body></html>
