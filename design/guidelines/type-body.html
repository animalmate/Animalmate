<!-- @dsCard group="Type" viewport="700x200" subtitle="한국어 본문 가독성 규칙" name="본문 조판" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
.wrap{display:flex;gap:20px;padding:16px 20px}
.col{flex:1;background:var(--surface-card);border:1px solid var(--border-default);border-radius:16px;padding:16px}
h4{margin:0 0 8px;font:var(--text-h3);color:var(--text-title)}
p{margin:0;font:var(--text-body)}
.k{font:var(--text-caption);color:var(--text-muted);margin-top:10px}
</style></head><body>
<div class="wrap">
  <div class="col">
    <h4>이번 주 토요일 유기견 보호소 봉사</h4>
    <p>10월 12일 토요일 오전 9시, 정문 앞에서 모여요. 장소와 정원은 생성 후 개별 수정할 수 있어요.</p>
    <div class="k">행간 1.6 · word-break: keep-all · 해요체</div>
  </div>
  <div class="col">
    <h4>플레이스홀더 표기</h4>
    <p>본문 양식에는 <code style="font:var(--text-code);background:var(--surface-sunken);border:1px solid var(--border-default);border-radius:6px;padding:1px 6px">{{간결_날짜}}</code> 같은 칩을 인라인으로 안내해요.</p>
    <div class="k">코드 칩: mono 13 · sunken 배경 · 6px 라운드</div>
  </div>
</div>
</body></html>
