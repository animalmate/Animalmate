<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
.row{display:flex;gap:12px;padding:16px}
.sw{flex:1;border-radius:12px;padding:10px 12px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;height:110px;font:var(--text-badge)}
.sw b{font-size:14px}.sw span{opacity:.85;font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--blue-500)"><b>블루 · Primary</b><span>#5588D2</span></div>
  <div class="sw" style="background:var(--blue-700)"><b>블루 700</b><span>#345C99</span></div>
  <div class="sw" style="background:var(--coral-500)"><b>코랄 · 위험/강조</b><span>#EE5A60</span></div>
  <div class="sw" style="background:var(--amber-500)"><b>앰버 · 대기/주의</b><span>#F0A72A</span></div>
  <div class="sw" style="background:var(--cream-50);color:var(--ink-700);border:1px solid var(--ink-200)"><b>크림 · 배경</b><span>#FAF6EE</span></div>
</div>
</body></html>
