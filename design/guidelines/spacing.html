<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
.wrap{display:flex;align-items:flex-end;gap:18px;padding:20px}
.i{display:flex;flex-direction:column;align-items:center;gap:6px;font:var(--text-caption);color:var(--text-muted);font-family:var(--font-mono)}
.bar{width:28px;background:var(--blue-300);border-radius:4px}
</style></head><body>
<div class="wrap">
  <div class="i"><div class="bar" style="height:4px"></div>1·4</div>
  <div class="i"><div class="bar" style="height:8px"></div>2·8</div>
  <div class="i"><div class="bar" style="height:12px"></div>3·12</div>
  <div class="i"><div class="bar" style="height:16px;background:var(--blue-500)"></div>4·16</div>
  <div class="i"><div class="bar" style="height:20px"></div>5·20</div>
  <div class="i"><div class="bar" style="height:24px;background:var(--blue-500)"></div>6·24</div>
  <div class="i"><div class="bar" style="height:32px"></div>8·32</div>
  <div class="i"><div class="bar" style="height:40px"></div>10·40</div>
  <div class="i"><div class="bar" style="height:48px"></div>12·48</div>
  <div class="i"><div class="bar" style="height:64px"></div>16·64</div>
</div>
</body></html>
